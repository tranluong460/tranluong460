<svg fill="none" viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
	<foreignObject width="100%" height="100%">
		<div xmlns="http://www.w3.org/1999/xhtml">
			<style>
				@keyframes borderGlow {
					0%, 100% {
						box-shadow:
							0 0 5px #58a6ff,
							0 0 15px rgba(88, 166, 255, 0.3),
							inset 0 0 5px rgba(88, 166, 255, 0.05);
					}
					50% {
						box-shadow:
							0 0 8px #a371f7,
							0 0 20px rgba(163, 113, 247, 0.3),
							inset 0 0 8px rgba(163, 113, 247, 0.05);
					}
				}

				@keyframes textGlow {
					0%, 100% {
						text-shadow: 0 0 10px rgba(88, 166, 255, 0.6), 0 0 30px rgba(88, 166, 255, 0.3);
						color: #58a6ff;
					}
					50% {
						text-shadow: 0 0 10px rgba(163, 113, 247, 0.6), 0 0 30px rgba(163, 113, 247, 0.3);
						color: #a371f7;
					}
				}

				@keyframes scanline {
					0% { top: -10%; }
					100% { top: 110%; }
				}

				@keyframes pulse {
					0%, 100% { opacity: 0.8; }
					50% { opacity: 0.3; }
				}

				@keyframes slideIn {
					0% { transform: translateX(-30px); opacity: 0; }
					100% { transform: translateX(0); opacity: 1; }
				}

				.card {
					font-family: 'Courier New', monospace;
					width: 100%;
					height: 200px;
					box-sizing: border-box;
					background: #0d1117;
					display: flex;
					flex-direction: column;
					align-items: center;
					justify-content: center;
					position: relative;
					overflow: hidden;
					border: 1px solid #58a6ff;
					border-radius: 12px;
					animation: borderGlow 4s ease-in-out infinite;
				}

				.scanline {
					position: absolute;
					width: 100%;
					height: 3px;
					background: linear-gradient(transparent, rgba(88, 166, 255, 0.06), transparent);
					animation: scanline 5s linear infinite;
				}

				.title {
					font-size: 36px;
					font-weight: bold;
					animation: textGlow 4s ease-in-out infinite;
					margin: 0 0 6px 0;
					letter-spacing: 4px;
				}

				.subtitle {
					font-size: 14px;
					color: #8b949e;
					margin: 0 0 16px 0;
					letter-spacing: 3px;
					animation: slideIn 1.5s ease forwards;
				}

				.divider {
					width: 50%;
					height: 1px;
					background: linear-gradient(90deg, transparent, #58a6ff, transparent);
					margin: 0 0 14px 0;
					animation: pulse 3s ease-in-out infinite;
				}

				.badges {
					display: flex;
					gap: 10px;
				}

				.badge {
					font-size: 10px;
					color: #58a6ff;
					border: 1px solid rgba(88, 166, 255, 0.3);
					padding: 3px 10px;
					border-radius: 20px;
					letter-spacing: 1px;
					animation: slideIn 1s ease forwards;
					opacity: 0;
				}

				.badge:nth-child(1) { animation-delay: 0.8s; }
				.badge:nth-child(2) { animation-delay: 1.0s; }
				.badge:nth-child(3) { animation-delay: 1.2s; }
				.badge:nth-child(4) { animation-delay: 1.4s; }
				.badge:nth-child(5) { animation-delay: 1.6s; }
			</style>
			<div class="card">
				<div class="scanline"></div>
				<div class="title">LUONG</div>
				<div class="subtitle">BACKEND DEVELOPER  //  VIETNAM</div>
				<div class="divider"></div>
				<div class="badges">
					<span class="badge">Node.js</span>
					<span class="badge">NestJS</span>
					<span class="badge">Next.js</span>
					<span class="badge">Electron</span>
					<span class="badge">Automation</span>
				</div>
			</div>
		</div>
	</foreignObject>
</svg>
