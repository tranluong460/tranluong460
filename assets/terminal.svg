<svg fill="none" viewBox="0 0 800 320" width="800" height="320" xmlns="http://www.w3.org/2000/svg">
	<foreignObject width="100%" height="100%">
		<div xmlns="http://www.w3.org/1999/xhtml">
			<style>
				@keyframes blink {
					0%, 100% { opacity: 1; }
					50% { opacity: 0; }
				}

				@keyframes typing1 {
					0%, 8% { width: 0; }
					16%, 100% { width: 22ch; }
				}

				@keyframes typing2 {
					0%, 20% { width: 0; }
					28%, 100% { width: 33ch; }
				}

				@keyframes typing3 {
					0%, 32% { width: 0; }
					40%, 100% { width: 25ch; }
				}

				@keyframes typing4 {
					0%, 44% { width: 0; }
					52%, 100% { width: 38ch; }
				}

				@keyframes typing5 {
					0%, 56% { width: 0; }
					64%, 100% { width: 41ch; }
				}

				@keyframes typing6 {
					0%, 68% { width: 0; }
					76%, 100% { width: 29ch; }
				}

				@keyframes typing7 {
					0%, 82% { width: 0; }
					88%, 100% { width: 4ch; }
				}

				.terminal {
					font-family: 'Courier New', monospace;
					background: #0d1117;
					border-radius: 10px;
					width: 100%;
					height: 320px;
					box-sizing: border-box;
					padding: 0;
					margin: 0;
					overflow: hidden;
					border: 1px solid #30363d;
				}

				.terminal-header {
					background: #161b22;
					padding: 10px 15px;
					display: flex;
					align-items: center;
					gap: 8px;
					border-bottom: 1px solid #30363d;
				}

				.dot {
					width: 12px;
					height: 12px;
					border-radius: 50%;
					display: inline-block;
				}

				.dot-red { background: #ff5f57; }
				.dot-yellow { background: #febc2e; }
				.dot-green { background: #28c840; }

				.terminal-title {
					color: #8b949e;
					font-size: 12px;
					margin-left: 10px;
				}

				.terminal-body {
					padding: 16px 20px;
					color: #c9d1d9;
					font-size: 13px;
					line-height: 1.9;
				}

				.line {
					white-space: nowrap;
					overflow: hidden;
					display: block;
				}

				.line1 { animation: typing1 20s steps(22) infinite; }
				.line2 { animation: typing2 20s steps(33) infinite; }
				.line3 { animation: typing3 20s steps(25) infinite; }
				.line4 { animation: typing4 20s steps(38) infinite; }
				.line5 { animation: typing5 20s steps(41) infinite; }
				.line6 { animation: typing6 20s steps(29) infinite; }
				.line7 { animation: typing7 20s steps(4) infinite; }

				.prompt { color: #7ee787; }
				.cmd { color: #79c0ff; }
				.str { color: #a5d6ff; }
				.flag { color: #d2a8ff; }
				.output { color: #f0883e; }
				.comment { color: #8b949e; }
				.key { color: #ff7b72; }
				.val { color: #79c0ff; }

				.cursor {
					display: inline-block;
					width: 8px;
					height: 14px;
					background: #58a6ff;
					animation: blink 1s step-end infinite;
					vertical-align: text-bottom;
				}
			</style>
			<div class="terminal">
				<div class="terminal-header">
					<span class="dot dot-red"></span>
					<span class="dot dot-yellow"></span>
					<span class="dot dot-green"></span>
					<span class="terminal-title">luong@vietnam ~ </span>
				</div>
				<div class="terminal-body">
					<span class="line line1"><span class="prompt">$ </span><span class="cmd">whoami</span> <span class="flag">--verbose</span></span>
					<span class="line line2"><span class="output">  name: </span><span class="str">Luong | Backend Developer</span></span>
					<span class="line line3"><span class="output">  location: </span><span class="str">Vietnam (UTC+7)</span></span>
					<span class="line line4"><span class="prompt">$ </span><span class="cmd">cat</span> <span class="str">skills.json</span> <span class="comment"># tech stack</span></span>
					<span class="line line5"><span class="output">  { </span><span class="key">"backend"</span>: [<span class="val">"Node.js","NestJS"</span>] }</span>
					<span class="line line6"><span class="output">  { </span><span class="key">"frontend"</span>: [<span class="val">"Next.js"</span>] }</span>
					<span class="line line7"><span class="prompt">$ </span><span class="cursor"></span></span>
				</div>
			</div>
		</div>
	</foreignObject>
</svg>
